name: Check Core Team Membership
description: Outputs whether the PR creator is a core team member.

inputs:
  pr-author:
    description: 'The GitHub username of the PR creator (github.event.pull_request.user.login)'
    required: true

outputs:
  is-internal:
    description: "'true' if actor is in core team, 'false' otherwise"
    value: ${{ steps.check.outputs.is-internal }}

runs:
  using: composite
  steps:
    - name: Check membership
      id: check
      shell: bash
      env:
        CORE_TEAM_INPUT: ${{ vars.CORE_TEAM }}
        PR_AUTHOR: ${{ inputs.pr-author }}
      run: |
        IS_INTERNAL="false"
        while IFS=',' read -ra members; do
          for member in "${members[@]}"; do
            trimmed=$(echo "$member" | xargs)
            if [ "$trimmed" = "$PR_AUTHOR" ]; then
              IS_INTERNAL="true"
            fi
          done
        done <<< "$CORE_TEAM_INPUT"
        echo "is-internal=$IS_INTERNAL" >> "$GITHUB_OUTPUT"
        echo "Actor: $PR_AUTHOR | Internal: $IS_INTERNAL"
