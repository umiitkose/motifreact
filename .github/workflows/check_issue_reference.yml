name: Check Internal Issue Reference

on:
  pull_request:
    types: [opened, edited, reopened]

permissions:
  pull-requests: read
  contents: read

jobs:
  check-issue-reference:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: 'false'

      - name: Check core team membership
        id: team-check
        uses: ./.github/actions/check-core-team
        with:
          pr-author: ${{ github.event.pull_request.user.login }}

      - name: Check internal issue reference
        if: steps.team-check.outputs.is-internal == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const prBody = context.payload.pull_request.body || '';
            const issuePattern = /#EDKUI-\d+/;
            const match = prBody.match(issuePattern);

            if (match) {
              core.info(`✅ Found internal issue reference: ${match[0]}`);
            } else {
              core.setFailed('❌ Core team PRs must include an internal issue reference (e.g., #EDKUI-1288)');
            }
