name: Auto Assign PR to Author

on:
  pull_request_target:
    types: [opened, reopened]

permissions:
  pull-requests: write
  contents: none

jobs:
  assign-and-review:
    runs-on: ubuntu-latest
    steps:
      - name: Check if actor is core team member
        id: check_team
        env:
          CORE_TEAM: ${{ vars.CORE_TEAM }}
        run: |
          CORE_TEAM_LIST="${CORE_TEAM}"
          ACTOR="${{ github.actor }}"
          if echo "$CORE_TEAM_LIST" | tr ',' '\n' | grep -qx "$ACTOR"; then
            echo "is_internal=true" >> $GITHUB_OUTPUT
          else
            echo "is_internal=false" >> $GITHUB_OUTPUT
          fi

      - name: Assign PR to author
        if: steps.check_team.outputs.is_internal == 'true'
        uses: toshimaru/auto-author-assign@v3.0.1