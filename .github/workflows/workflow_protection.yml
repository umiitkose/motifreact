name: Workflow Protection

on:
  pull_request_target:
    paths:
      - '.github/workflows/**'

permissions:
  pull-requests: read
  contents: read

jobs:
  check-workflow-changes:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          persist-credentials: 'false'

      - name: Check core team membership
        id: team-check
        uses: ./.github/actions/check-core-team
        with:
          pr-author: ${{ github.event.pull_request.user.login }}

      - name: Fail if not core team
        if: steps.team-check.outputs.is-internal != 'true'
        run: |
          echo "❌ Access Denied: $GITHUB_ACTOR is not allowed to change workflow files. Only core team members can do this."
          exit 1
        shell: bash
